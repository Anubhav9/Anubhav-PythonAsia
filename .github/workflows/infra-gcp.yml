name: GCP Infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true

    defaults:
      run:
        working-directory: gcp-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_python_asia_db_password: ${{ secrets.TF_VAR_PYTHON_ASIA_DB_PASSWORD }}
        run: terraform plan -out=tfplan

      - name: Guard apply on main branch
        if: github.event.inputs.action == 'apply'
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Apply is allowed only from main branch."
            exit 1
          fi

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_python_asia_db_password: ${{ secrets.TF_VAR_PYTHON_ASIA_DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs (after apply)
        if: github.event.inputs.action == 'apply'
        run: terraform output
