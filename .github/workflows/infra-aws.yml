name: AWS Infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-3
      TF_IN_AUTOMATION: true

    defaults:
      run:
        working-directory: aws-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_python_asia_db_password: ${{ secrets.TF_VAR_PYTHON_ASIA_DB_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Upload tfplan artifact
        if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: aws-tfplan
          path: aws-infra/tfplan

  apply:
    if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'
    needs: plan
    runs-on: ubuntu-latest
    environment: infra-aws-apply
    env:
      AWS_REGION: ap-northeast-3
      TF_IN_AUTOMATION: true

    defaults:
      run:
        working-directory: aws-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: aws-tfplan
          path: aws-infra

      - name: Terraform Apply / Destroy
        env:
          TF_VAR_python_asia_db_password: ${{ secrets.TF_VAR_PYTHON_ASIA_DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs (after apply)
        if: github.event.inputs.action == 'apply'
        run: terraform output
